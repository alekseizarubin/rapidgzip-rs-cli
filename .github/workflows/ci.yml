name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            kind: test
          - os: ubuntu-24.04-arm
            kind: test
          - os: macos-15-intel
            kind: build
          - os: macos-15
            kind: build
          - os: windows-latest
            kind: build
          - os: windows-11-arm
            kind: build
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install native build dependencies
        shell: bash
        run: |
          set -euxo pipefail
          case "$RUNNER_OS" in
            Linux)
              sudo apt-get update
              sudo apt-get install -y cmake build-essential zlib1g-dev nasm
              ;;
            macOS)
              brew install -q nasm
              ;;
            Windows)
              choco install -y nasm
              echo "C:\Program Files\NASM" >> "$GITHUB_PATH"
              ;;
          esac

      - name: Run CLI tests
        if: matrix.kind == 'test'
        run: cargo test

      - name: Smoke build release binary
        if: matrix.kind == 'build'
        run: cargo build --release
